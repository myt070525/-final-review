# GitHub Actions — 自动构建前端并部署到 GitHub Pages
# 每次 push 到 main 分支时触发

name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:    # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          # 在 GitHub 仓库 Settings → Secrets and variables → Actions → Variables 中设置：
          #   VITE_BASE:       GitHub Pages 路径，如 /final-review/
          #   VITE_API_BASE:   Render 后端地址，如 https://final-review-api.onrender.com/api
          VITE_BASE: ${{ vars.VITE_BASE || '/' }}
          VITE_API_BASE: ${{ vars.VITE_API_BASE || '/api' }}
        run: npx vite build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
